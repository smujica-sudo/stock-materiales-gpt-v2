  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />

  <title>Kawas Stock Pro · Phase 2 Direct</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;600;700&display=swap');
    :root{
      color-scheme:light;
      --bg:#f7f2fa;
      --surface:#fff;
      --surface-2:#fdf7ff;
      --surface-3:#f4edff;
      --text:#1d1b20;
      --muted:#625b71;
      --line:#e7e0ec;
      --primary:#6750a4;
      --on-primary:#fff;
      --primary-soft:#ece6f0;
      --secondary:#625b71;
      --error:#b3261e;
      --error-soft:#f9dedc;
      --warn:#b26a00;
      --warn-soft:#ffddb0;
      --success:#386a20;
      --success-soft:#d8f2c8;
      --shadow:0 10px 32px rgba(33,24,56,.10);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
      --radius-sm:14px;
      --app-width:520px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#app{height:100%;min-height:100dvh;margin:0}
    html,body{background:radial-gradient(circle at top,#fcfbff 0%,#f7f2fa 55%,#efe7f8 100%);font-family:Roboto,system-ui,sans-serif;color:var(--text)}
    body{overflow:auto}
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app-shell{height:100dvh;min-height:100dvh;max-width:var(--app-width);margin:0 auto;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,rgba(255,255,255,.76),rgba(255,255,255,.96));backdrop-filter:blur(20px)}
    .topbar{padding:22px 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,#20104a,#6750a4 65%,#b39ddb);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;box-shadow:var(--shadow)}
    .brand h1{font-size:18px;line-height:1.1;margin:0}
    .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
    .icon-btn{width:42px;height:42px;border:none;border-radius:16px;background:var(--surface);box-shadow:0 1px 0 rgba(0,0,0,.04),0 6px 18px rgba(34,24,60,.08);display:grid;place-items:center;color:var(--secondary)}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:var(--surface);font-size:12px;color:var(--muted);box-shadow:0 1px 0 rgba(0,0,0,.03)}
    .hero{padding:0 18px 16px}
    .hero-card{background:linear-gradient(135deg,#22104a,#4f378b 60%,#7a5dc7);color:#fff;border-radius:30px;padding:20px;box-shadow:0 22px 40px rgba(44,26,88,.28)}
    .hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
    .mini-kpi{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;text-align:center}
    .mini-kpi strong{display:block;font-size:22px;font-family:"Roboto Mono",monospace}
    .mini-kpi span{font-size:10px;opacity:.86;text-transform:uppercase;letter-spacing:.08em}
    .content{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:0 18px 104px}
    .section-title{display:flex;align-items:center;justify-content:space-between;margin:12px 0 10px}
    .section-title h2{font-size:13px;text-transform:uppercase;letter-spacing:.10em;color:var(--muted);margin:0}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:var(--radius-lg);padding:16px;box-shadow:0 8px 28px rgba(30,25,58,.06)}
    .category-card{position:relative;min-height:118px;display:flex;flex-direction:column;justify-content:space-between}
    .category-card .accent{position:absolute;left:0;right:0;bottom:0;height:4px;border-radius:0 0 22px 22px;opacity:.9}
    .badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:700}
    .badge-critical{background:#ffd9d6;color:#8c1d18}
    .badge-ok{background:#e7f7df;color:#275117}
    .list{display:grid;gap:10px}
    .row{display:flex;align-items:center;gap:12px}
    .item-card{padding:14px 16px}
    .item-name{font-size:14px;font-weight:600;line-height:1.35}
    .meta{font-size:11px;color:var(--muted)}
    .stock{font-family:"Roboto Mono",monospace;font-weight:700;font-size:24px;line-height:1}
    .progress{margin-top:10px;height:7px;background:#ebe4f1;border-radius:999px;overflow:hidden}
    .progress > div{height:100%;border-radius:999px}
    .status-chip{font-size:11px;font-weight:700;padding:6px 10px;border-radius:999px;white-space:nowrap}
    .status-ok{background:var(--success-soft);color:var(--success)}
    .status-low{background:var(--warn-soft);color:var(--warn)}
    .status-critical,.status-zero{background:var(--error-soft);color:var(--error)}
    .alert-panel{background:linear-gradient(180deg,#fff,#fff7f7);border:1px solid #f0d6d4}
    .search-box,.field{width:100%;border:none;outline:none;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
    .search-box:focus,.field:focus{border-color:#b7a9df;box-shadow:0 0 0 4px rgba(103,80,164,.12)}
    .fab-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .action-btn{border:none;border-radius:22px;padding:14px 10px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-tonal{background:var(--primary-soft);color:var(--primary)}
    .btn-soft-success{background:var(--success-soft);color:var(--success)}
    .btn-soft-error{background:var(--error-soft);color:var(--error)}
    .btn-soft-warn{background:var(--warn-soft);color:var(--warn)}
    .stack{display:grid;gap:12px}
    .sheet{background:linear-gradient(180deg,#fff,#fdfcff);border:1px solid var(--line);border-radius:28px;padding:18px;box-shadow:var(--shadow)}
    .detail-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .detail-stock{font-family:"Roboto Mono",monospace;font-size:54px;font-weight:700;line-height:1;color:var(--primary)}
    .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .metric{padding:14px;border-radius:20px;background:var(--surface-2);border:1px solid var(--line);text-align:center}
    .metric strong{display:block;font-family:"Roboto Mono",monospace;font-size:20px}
    .metric span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .history-row{display:flex;align-items:center;gap:12px;padding:12px 2px;border-bottom:1px solid #f0ecf4}
    .history-row:last-child{border-bottom:none}
    .history-dot{width:38px;height:38px;border-radius:14px;display:grid;place-items:center;font-weight:700}
    .empty{padding:36px 16px;text-align:center;color:var(--muted)}
    .bottom-nav{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(calc(100vw - 24px),calc(var(--app-width) - 24px));background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border:1px solid rgba(231,224,236,.8);box-shadow:0 20px 40px rgba(31,24,44,.12);border-radius:26px;padding:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    .nav-btn{border:none;background:transparent;border-radius:18px;padding:10px 6px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:6px;font-size:10px;font-weight:600}
    .nav-btn.active{background:var(--primary-soft);color:var(--primary)}
    .nav-dot{width:7px;height:7px;border-radius:50%;background:var(--error);position:absolute;top:8px;right:calc(50% - 14px)}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:20;max-width:min(92vw,460px);background:#1d1b20;color:#fff;padding:14px 18px;border-radius:18px;box-shadow:0 18px 38px rgba(0,0,0,.24);font-size:13px}
    .login{min-height:100dvh;display:grid;place-items:center;padding:24px}
    .login-card{width:min(100%,400px);background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:34px;padding:28px;box-shadow:0 22px 40px rgba(34,24,60,.12);text-align:center}
    .pin{font-size:32px;letter-spacing:.45em;text-align:center;font-family:"Roboto Mono",monospace}
    .small{font-size:12px;color:var(--muted)}
    .link-btn{border:none;background:none;color:var(--primary);font-weight:700}
    @media (max-width:430px){

      .detail-stock{font-size:44px}
      .grid-2{grid-template-columns:1fr}
      .fab-row{grid-template-columns:1fr}
    }

</style>

const Utils = {
  clone: value => JSON.parse(JSON.stringify(value)),
  esc: str => String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),
  fmtInt: n => Number(n || 0).toLocaleString('es-ES'),
  nowLabel(){
    const d = new Date();
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  },
  parseDate(input){
    if(!input) return null;
    const direct = new Date(input);
    if(!Number.isNaN(direct.getTime())) return direct;
    const m = String(input).match(/^(\d{2})\/(\d{2})(?:\/(\d{2,4}))?\s+(\d{2}):(\d{2})$/);
    if(!m) return null;
    let year = Number(m[3] || new Date().getFullYear());
    if(year < 100) year += 2000;
    return new Date(year, Number(m[2])-1, Number(m[1]), Number(m[4]), Number(m[5]));
  },
  projection(item, history){
    if(item.stock <= 0) return { title:'Sin stock', days:0, use:'-', date:'-', color:'var(--error)' };
    const downs = history.filter(h => h.id === item.id && Number(h.ns) < Number(h.os));
    const totalConsumed = downs.reduce((acc,h) => acc + (Number(h.os) - Number(h.ns)), 0);
    const dates = downs.map(h => Utils.parseDate(h.ts)).filter(Boolean).sort((a,b) => a-b);
    let spanDays = 0;
    if(dates.length >= 2) spanDays = Math.max(1, Math.round((dates.at(-1) - dates[0]) / 86400000));
    else if(dates.length === 1) spanDays = Math.max(1, Math.round((Date.now() - dates[0].getTime()) / 86400000));
    const fallbackUse = item.min > 0 ? Math.max(1, Math.round(item.min / 14)) : 1;
    const dailyUse = totalConsumed > 0 && spanDays > 0 ? totalConsumed / spanDays : fallbackUse;
    const days = Math.max(0, Math.round(item.stock / Math.max(0.1, dailyUse)));
    const out = new Date(); out.setDate(out.getDate() + days);
    const color = days <= 7 ? 'var(--error)' : days <= 21 ? 'var(--warn)' : 'var(--success)';
    return {
      title: days <= 7 ? 'Agotamiento inminente' : days <= 21 ? 'Pedir pronto' : days <= 45 ? 'Stock moderado' : 'Stock holgado',
      days,
      use: dailyUse < 1 ? dailyUse.toFixed(1) : String(Math.round(dailyUse)),
      date: `${String(out.getDate()).padStart(2,'0')}/${String(out.getMonth()+1).padStart(2,'0')}`,
      color
    };
  }
};


function createStore(config){
  return {
    state: {
      user: null,
      route: 'home',
      selectedCategory: null,
      selectedSubcategory: null,
      selectedItemId: null,
      search: '',
      adjustMode: null,
      adjustValue: '',
      adjustNote: '',
      items: Utils.clone(SEED_ITEMS),
      history: [],
      toast: null,
      syncing: false,
      syncQueue: [],
      lastSyncAt: 0
    },
    listeners: [],
    subscribe(fn){ this.listeners.push(fn); },
    emit(){ this.listeners.forEach(fn => fn(this.state)); },
    set(patch){ Object.assign(this.state, patch); this.emit(); },
    persist(){
      localStorage.setItem(config.STORAGE_KEY, JSON.stringify({
        user: this.state.user,
        items: this.state.items,
        history: this.state.history,
        syncQueue: this.state.syncQueue,
        lastSyncAt: this.state.lastSyncAt
      }));
    },
    hydrate(){
      try{
        const raw = JSON.parse(localStorage.getItem(config.STORAGE_KEY) || '{}');
        if(Array.isArray(raw.items) && raw.items.length) this.state.items = raw.items;
        if(Array.isArray(raw.history)) this.state.history = raw.history;
        if(Array.isArray(raw.syncQueue)) this.state.syncQueue = raw.syncQueue;
        if(raw.user) this.state.user = raw.user;
        if(raw.lastSyncAt) this.state.lastSyncAt = raw.lastSyncAt;
      }catch{}
    }
  };
}

function createApi(store, config){
  let notify = () => {};
  return {
    setNotifier(fn){ notify = fn || (()=>{}); },
    isEnabled(){ return /^https:\/\//.test(config.API_URL); },
    async request(url, options={}){
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);
      try{
        const res = await fetch(url, { ...options, signal: controller.signal, cache:'no-store' });
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } finally {
        clearTimeout(timeout);
      }
    },
    async sync({ force=false }={}){
      if(!this.isEnabled() || store.state.syncing) return;
      if(!force && Date.now() - store.state.lastSyncAt < config.SYNC_TTL_MS) return;
      store.set({ syncing:true });
      try{
        const [itemsResp, historyResp] = await Promise.all([
          this.request(`${config.API_URL}?action=getAll`),
          this.request(`${config.API_URL}?action=getHistory&limit=120`)
        ]);
        if(itemsResp.success && Array.isArray(itemsResp.items)){
          store.state.items = itemsResp.items.map(x => ({
            id:String(x.id), cat:String(x.categoria), subcat:String(x.subcategoria || ''), name:String(x.nombre),
            stock:Number(x.stock) || 0, min:Number(x.minimo) || 0, unit:String(x.unidad || 'uds'), alert:String(x.alerta || '')
          }));
        }
        if(historyResp.success && Array.isArray(historyResp.entries)){
          store.state.history = historyResp.entries.map(x => ({
            id:String(x.itemId), nm:String(x.itemNombre), cat:String(x.categoria), tp:String(x.tipo),
            os:Number(x.stockAnterior) || 0, ns:Number(x.stockNuevo) || 0, nt:String(x.nota || ''),
            u:String(x.usuario || '?'), ts:x.timestamp ? x.timestamp.substring(0,16).replace('T',' ') : ''
          }));
        }
        store.state.lastSyncAt = Date.now();
        store.persist();
        store.emit();
      } catch (err) {
        notify(`Sync parcial: ${err.message}`, 'warn');
      } finally {
        store.set({ syncing:false });
      }
    },
    async flushQueue(){
      if(!this.isEnabled() || !store.state.syncQueue.length) return;
      const batch = [...store.state.syncQueue];
      for(const entry of batch){
        try{
          const body = JSON.stringify({
            action:'updateStock', itemId:entry.itemId, newStock:entry.newStock, oldStock:entry.oldStock,
            tipo:entry.type, usuario:entry.user, nota:entry.note
          });
          const resp = await this.request(config.API_URL, {
            method:'POST', body, headers:{ 'Content-Type':'text/plain;charset=utf-8' }
          });
          if(!resp.success) throw new Error(resp.error || 'sync');
          store.state.syncQueue = store.state.syncQueue.filter(q => q !== entry);
          store.persist();
        } catch {
          notify('Cambios guardados localmente. Reintentaré sync.', 'warn');
          break;
        }
      }
    },
    flushQueueDebounced: (() => {
      let timer;
      return function(fn){
        clearTimeout(timer);
        timer = setTimeout(() => fn(), 900);
      };
    })()
  };
}


function createInventory(store, api){
  return {
    get items(){ return store.state.items; },
    get history(){ return store.state.history; },
    itemById(id){ return this.items.find(x => x.id === id); },
    groupedByCategory(){ return this.items.reduce((acc,item) => ((acc[item.cat] ??= []).push(item), acc), {}); },
    groupedSubcategories(cat){ return this.items.filter(i => i.cat === cat).reduce((acc,item)=>((acc[item.subcat || 'General'] ??= []).push(item), acc), {}); },
    status(item){ if(item.stock <= 0) return 'zero'; if(item.stock < Math.max(1, item.min * 0.3)) return 'critical'; if(item.stock < item.min) return 'low'; return 'ok'; },
    statusMeta(item){
      const status = this.status(item);
      return { status, label: ({ok:'OK',low:'Bajo',critical:'Crítico',zero:'Agotado'})[status], className:`status-${status}` };
    },
    alerts(){
      return [...this.items].filter(item => this.status(item) !== 'ok').sort((a,b) => {
        const order = {zero:0,critical:1,low:2,ok:3};
        return order[this.status(a)] - order[this.status(b)] || a.stock - b.stock;
      });
    },
    metrics(){
      return {
        total: this.items.length,
        low: this.items.filter(x => this.status(x) === 'low').length,
        critical: this.items.filter(x => this.status(x) === 'critical').length,
        zero: this.items.filter(x => this.status(x) === 'zero').length,
        totalStock: this.items.reduce((sum,x)=>sum + Number(x.stock || 0),0)
      };
    },
    searchResults(q){
      const needle = q.trim().toLowerCase();
      if(!needle) return [];
      return this.items.filter(item => [item.name,item.cat,item.subcat,item.alert].filter(Boolean).some(value => value.toLowerCase().includes(needle)));
    },
    recordMovement({ itemId, newStock, type, note, userName }){
      const item = this.itemById(itemId);
      if(!item) return;
      const oldStock = Number(item.stock);
      item.stock = Number(newStock);
      store.state.history.unshift({ id:item.id, nm:item.name, cat:item.cat, tp:type, os:oldStock, ns:Number(newStock), nt:note || '', u:userName, ts:Utils.nowLabel() });
      store.state.syncQueue.push({ itemId:item.id, oldStock, newStock:Number(newStock), type, note:note || '', user:userName, createdAt:Date.now() });
      store.persist();
      store.emit();
      api.flushQueueDebounced(() => api.flushQueue());
    },
    projection(item){ return Utils.projection(item, this.history); }
  };
}

      const blob = new Blob([html], { type:'text/html' });

    render(){

        const pin = document.getElementById('pin-input');
        if(pin) pin.focus();
        return;
      }
      let view = this.homeView();
      if(store.state.selectedItemId) view = this.detailView();
      else if(store.state.selectedCategory && store.state.selectedSubcategory) view = this.subcategoryView();
      else if(store.state.selectedCategory) view = this.categoryView();
      else if(store.state.route === 'search') view = this.searchView();
      else if(store.state.route === 'alerts') view = this.alertsView();
      else if(store.state.route === 'history') view = this.historyView();
      else if(store.state.route === 'report') view = this.reportView();
      this.app.innerHTML = `${store.state.toast ? `<div class="toast">${utils.esc(store.state.toast.message)}</div>` : ''}<div class="app-shell">${view}</div>`;
      const search = document.querySelector('[data-action="bind-search"]');
      if(search) search.focus({ preventScroll:true });
    }
  };
  return ui;
}

const api = createApi(store, CONFIG);
const inventory = createInventory(store, api);
const ui = createUI({ store, inventory, api, config: CONFIG, icons: ICONS, colors: COLORS, utils: Utils });
api.setNotifier((message, type) => ui.toast(message, type));

function resetToHome(){
  store.set({ route:'home', selectedCategory:null, selectedSubcategory:null, selectedItemId:null, adjustMode:null, adjustValue:'', adjustNote:'' });
}

function loginWithPin(pin){
  const user = CONFIG.USERS.find(x => x.pin === pin);
  if(!user){ ui.toast('PIN incorrecto', 'warn'); return; }
  store.set({ user, route:'home' });
  api.sync({ force:true });
  ui.toast(`Hola, ${user.name}`);
}

document.addEventListener('click', async (e) => {
  const target = e.target.closest('[data-action]');
  if(!target) return;
  const action = target.dataset.action;
  if(action === 'go-tab') store.set({ route:target.dataset.tab, selectedCategory:null, selectedSubcategory:null, selectedItemId:null, adjustMode:null, adjustValue:'', adjustNote:'' });
  if(action === 'open-category') store.set({ selectedCategory:target.dataset.category, selectedSubcategory:null, selectedItemId:null });
  if(action === 'open-subcategory') store.set({ selectedSubcategory:target.dataset.subcategory, selectedItemId:null });
  if(action === 'open-item') store.set({ selectedItemId:target.dataset.id, adjustMode:null, adjustValue:'', adjustNote:'' });
  if(action === 'back'){
    if(store.state.selectedItemId) store.set({ selectedItemId:null, adjustMode:null, adjustValue:'', adjustNote:'' });
    else if(store.state.selectedSubcategory) store.set({ selectedSubcategory:null });
    else if(store.state.selectedCategory) store.set({ selectedCategory:null });
    else resetToHome();
  }
  if(action === 'sync-manual'){ ui.toast('Sincronizando...'); await api.sync({ force:true }); await api.flushQueue(); }
  if(action === 'set-adjust-mode') store.set({ adjustMode:target.dataset.mode, adjustValue:'', adjustNote:'' });
  if(action === 'cancel-adjust') store.set({ adjustMode:null, adjustValue:'', adjustNote:'' });
  if(action === 'confirm-adjust'){
    const item = inventory.itemById(store.state.selectedItemId);
    const value = Number(store.state.adjustValue);
    if(!item || Number.isNaN(value) || value < 0){ ui.toast('Valor inválido', 'warn'); return; }
    const oldStock = Number(item.stock);
    const newStock = store.state.adjustMode === 'in' ? oldStock + value : store.state.adjustMode === 'out' ? Math.max(0, oldStock - value) : value;
    const type = store.state.adjustMode === 'in' ? 'ingreso' : store.state.adjustMode === 'out' ? 'salida' : 'ajuste';
    inventory.recordMovement({ itemId:item.id, newStock, type, note:store.state.adjustNote, userName:store.state.user.name });
    store.set({ selectedItemId:item.id, adjustMode:null, adjustValue:'', adjustNote:'' });
    ui.toast(`${item.name}: ${oldStock} → ${newStock}`);
  }
  if(action === 'export-report') ui.exportReport();
  if(action === 'open-sheet') window.open(CONFIG.SHEET_URL, '_blank');
});

document.addEventListener('input', (e) => {
  const target = e.target;
  const action = target.dataset.action;
  if(action === 'bind-search') store.set({ search:target.value });
  if(action === 'bind-adjust-value') store.set({ adjustValue:target.value });
  if(action === 'bind-adjust-note') store.set({ adjustNote:target.value });
  if(target.id === 'pin-input' && target.value.length === 4) loginWithPin(target.value);
});

let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].clientX;
  touchStartY = e.changedTouches[0].clientY;
}, { passive:true });

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
  if(dx > 85 && dy < 75){
    if(store.state.selectedItemId) store.set({ selectedItemId:null, adjustMode:null, adjustValue:'', adjustNote:'' });
    else if(store.state.selectedSubcategory) store.set({ selectedSubcategory:null });
    else if(store.state.selectedCategory) store.set({ selectedCategory:null });
  }
}, { passive:true });

window.addEventListener('online', async () => {
  ui.toast('Conexión restablecida');
  await api.sync({ force:true });
  await api.flushQueue();
});

store.subscribe(() => { store.persist(); ui.render(); });
store.hydrate();
ui.render();
if(store.state.user) api.sync({ force:false });
</script>
</body>
</html>
